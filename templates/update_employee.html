<!DOCTYPE html>
<html>
<head>
    <title>Update Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Update Employee</h2>

    <form method="POST">

        <input type="text"
               name="full_name"
               value="{{ employee[1] }}"
               class="form-control mb-2">

        <input type="email"
               name="email"
               value="{{ employee[3] }}"
               class="form-control mb-2">

        <input type="text"
               name="phone"
               value="{{ employee[4] }}"
               class="form-control mb-2">

        <input type="text"
               name="department"
               value="{{ employee[5] }}"
               class="form-control mb-2">

        <input type="text"
               name="designation"
               value="{{ employee[6] }}"
               class="form-control mb-2">

        <button type="submit"
                class="btn btn-success">
            Update Employee
        </button>

    </form>

</div>

</body>
</html>
