<!DOCTYPE html>
<html>
<head>
<title>Add Salary Structure</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-success text-white">
<h3>Salary Structure</h3>
</div>

<div class="card-body">

<form method="POST">

<input class="form-control mb-3" type="number" name="employee_id" placeholder="Employee ID">

<input class="form-control mb-3" type="number" name="basic_salary" placeholder="Basic Salary">

<input class="form-control mb-3" type="number" name="house_allowance" placeholder="House Allowance">

<input class="form-control mb-3" type="number" name="medical_allowance" placeholder="Medical Allowance">

<input class="form-control mb-3" type="number" name="transport_allowance" placeholder="Transport Allowance">

<input class="form-control mb-3" type="number" name="tax" placeholder="Tax">

<input class="form-control mb-3" type="number" name="loan_deduction" placeholder="Loan Deduction">

<input class="form-control mb-3" type="number" name="other_deduction" placeholder="Other Deduction">

<button class="btn btn-success">
Save
</button>

</form>

</div>
</div>

</div>

</body>
</html>
