<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>Employee Profile</h3>
        </div>

        <div class="card-body">

            <p><strong>ID:</strong> {{ employee[0] }}</p>
            <p><strong>Name:</strong> {{ employee[1] }}</p>
            <p><strong>CNIC:</strong> {{ employee[2] }}</p>
            <p><strong>Email:</strong> {{ employee[3] }}</p>
            <p><strong>Phone:</strong> {{ employee[4] }}</p>
            <p><strong>Department:</strong> {{ employee[5] }}</p>
            <p><strong>Designation:</strong> {{ employee[6] }}</p>
            <p><strong>Joining Date:</strong> {{ employee[7] }}</p>
            <p><strong>Salary:</strong> {{ employee[8] }}</p>

        </div>
    </div>

</div>

</body>
</html>
