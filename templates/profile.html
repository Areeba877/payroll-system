<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Employee Profile</h3>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-striped">

                <tr>
                    <th width="30%">Employee ID</th>
                    <td>{{ employee[0] }}</td>
                </tr>

                <tr>
                    <th>Full Name</th>
                    <td>{{ employee[1] }}</td>
                </tr>

                <tr>
                    <th>CNIC</th>
                    <td>{{ employee[2] }}</td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>{{ employee[3] }}</td>
                </tr>

                <tr>
                    <th>Phone</th>
                    <td>{{ employee[4] }}</td>
                </tr>

                <tr>
                    <th>Department</th>
                    <td>{{ employee[5] }}</td>
                </tr>

                <tr>
                    <th>Designation</th>
                    <td>{{ employee[6] }}</td>
                </tr>

                <tr>
                    <th>Joining Date</th>
                    <td>{{ employee[7] }}</td>
                </tr>

                <tr>
                    <th>Basic Salary</th>
                    <td>{{ employee[8] }}</td>
                </tr>

                <tr>
                    <th>Bank Account</th>
                    <td>{{ employee[9] }}</td>
                </tr>

            </table>

        </div>

    </div>

</div>

</body>
</html>
